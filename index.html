<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photobox Report Pro</title>  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff4ecd, #3b82f6, #facc15);
      background-size: 300% 300%;
      animation: gradientMove 10s ease infinite;
      color: #0f172a;
      margin: 0;
      padding: 20px;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      max-width: 420px;
      margin: auto;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      padding: 25px;
      border-radius: 24px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #111827;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 14px;
      border: none;
      background: #f1f5f9;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 14px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }

    .generate {
      background: linear-gradient(90deg, #22c55e, #4ade80);
      color: white;
    }

    .copy {
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      color: white;
    }

    .wa {
      background: linear-gradient(90deg, #25D366, #4ade80);
      color: white;
    }

    button:hover {
      transform: scale(1.02);
    }

    textarea {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      background: #020617;
      color: #4ade80;
      border: none;
      height: 200px;
      font-size: 13px;
    }

    .footer {
      text-align: center;
      margin-top: 10px;
      font-size: 12px;
      color: #64748b;
    }
  </style></head>
<body><div class="container">
  <h2>📸 Photobox Professional</h2>  <input type="number" id="cash" placeholder="Cash (Rp)" />
  <input type="number" id="qris" placeholder="QRIS (Rp)" />
  <input type="number" id="kertas" placeholder="Kertas Terpakai" />
  <input type="number" id="sisa" placeholder="Sisa Kertas" /><button class="generate" onclick="generateReport()">Generate Report</button> <button class="copy" onclick="copyText()">Copy Report</button> <button class="wa" onclick="sendWA()">Kirim ke WhatsApp</button>

  <textarea id="output" readonly placeholder="Hasil laporan akan muncul di sini..."></textarea>  <div class="footer">© Photobox System</div>
</div><script>
function rupiah(n) {
  return 'Rp ' + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function generateReport() {
  const cash = +document.getElementById('cash').value || 0;
  const qris = +document.getElementById('qris').value || 0;
  const kertas = document.getElementById('kertas').value || 0;
  const sisa = document.getElementById('sisa').value || 0;

  const total = cash + qris;

  const tanggal = new Date().toLocaleDateString('id-ID', {
    day: 'numeric', month: 'long', year: 'numeric'
  });

  const text = `📸 REPORT HARIAN PHOTOBOX GACOAN\n\nTanggal : ${tanggal}\n\nCash = ${rupiah(cash)}\nQRIS = ${rupiah(qris)}\n\nKertas terpakai = ${kertas}\nSisa kertas = ${sisa}\n\nTotal pendapatan = ${rupiah(total)}\n\nTerima kasih 🙏`;

  document.getElementById('output').value = text;
}

function copyText() {
  const t = document.getElementById('output');
  t.select();
  document.execCommand('copy');
  alert('Report berhasil dicopy');
}

function sendWA() {
  const text = encodeURIComponent(document.getElementById('output').value);
  window.open(`https://wa.me/?text=${text}`, '_blank');
}
</script></body>
</html>
